<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Bright · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF8;
  --bg-dark: #1B2A1F;
  --bg-dark-2: #243028;
  --card: #FFFFFF;
  --border: #E8E5DE;
  --border-light: #F0EDE6;
  --text: #1A1D1A;
  --text-secondary: #5A5F58;
  --text-muted: #8A8E87;
  --green: #2E7D4F;
  --green-light: #E8F5EC;
  --green-glow: #43A66A;
  --green-dark: #1B5E3A;
  --red: #C62828;
  --red-light: #FDEAEA;
  --muted-bg: #F4F3F0;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Layout ── */
.auth-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}

.auth-container {
  width: 100%;
  max-width: 420px;
}

/* ── Logo ── */
.auth-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  margin-bottom: 40px;
  cursor: pointer;
}

.logo-dots { display: flex; gap: 5px; }
.logo-dot { width: 9px; height: 9px; border-radius: 50%; }
.logo-dot:nth-child(1) { background: var(--green); }
.logo-dot:nth-child(2) { background: var(--green-glow); }
.logo-dot:nth-child(3) { background: #8BC6A0; }

.logo-text {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--text);
}

/* ── Card ── */
.auth-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.04);
}

.auth-title {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: 28px;
  text-align: center;
  margin-bottom: 6px;
  color: var(--text);
}

.auth-subtitle {
  text-align: center;
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 32px;
}

/* ── Tabs ── */
.auth-tabs {
  display: flex;
  background: var(--muted-bg);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 28px;
}

.auth-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  background: transparent;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.auth-tab.active {
  background: var(--card);
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

/* ── Form ── */
.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 13px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--text);
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-input::placeholder {
  color: var(--text-muted);
}

.form-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(46,125,79,0.1);
}

.form-input.error {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(198,40,40,0.08);
}

/* ── Password toggle ── */
.input-wrapper {
  position: relative;
}

.password-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  padding: 4px;
}

.password-toggle:hover {
  color: var(--text-secondary);
}

/* ── Button ── */
.auth-btn {
  width: 100%;
  padding: 14px;
  background: var(--green);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(46,125,79,0.25);
  margin-top: 8px;
}

.auth-btn:hover {
  background: var(--green-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(46,125,79,0.3);
}

.auth-btn:active {
  transform: translateY(0);
}

.auth-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* ── Messages ── */
.auth-message {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 20px;
  display: none;
  line-height: 1.5;
}

.auth-message.error {
  background: var(--red-light);
  color: var(--red);
  display: block;
}

.auth-message.success {
  background: var(--green-light);
  color: var(--green-dark);
  display: block;
}

/* ── Divider ── */
.auth-divider {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  margin: 24px 0;
  position: relative;
}

.auth-divider::before,
.auth-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: calc(50% - 24px);
  height: 1px;
  background: var(--border);
}

.auth-divider::before { left: 0; }
.auth-divider::after { right: 0; }

/* ── Footer ── */
.auth-footer {
  text-align: center;
  padding: 24px;
  font-size: 13px;
  color: var(--text-muted);
}

.auth-footer a {
  color: var(--green);
  font-weight: 500;
}

.auth-footer a:hover {
  text-decoration: underline;
}

/* ── Forgot password ── */
.forgot-link {
  display: block;
  text-align: right;
  font-size: 13px;
  color: var(--green);
  font-weight: 500;
  margin-top: -12px;
  margin-bottom: 20px;
  cursor: pointer;
}

.forgot-link:hover {
  text-decoration: underline;
}

/* ── Loading spinner ── */
.spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Consent checkboxes ── */
.consent-group {
  margin-bottom: 16px;
}

.consent-label {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  cursor: pointer;
}

.consent-label input[type="checkbox"] {
  margin-top: 3px;
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  accent-color: var(--green);
  cursor: pointer;
}

.consent-label a {
  color: var(--green);
  font-weight: 500;
}

.consent-label a:hover {
  text-decoration: underline;
}

.auth-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* ── Maple leaf ── */
.maple-footer {
  text-align: center;
  padding: 16px 24px 28px;
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  opacity: 0.5;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .auth-card {
    padding: 32px 24px;
    border-radius: 12px;
  }
  .auth-title { font-size: 24px; }
}
</style>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-container">

    <a href="index.html" class="auth-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;"><path d="M10 17.5c0-1.5-1.2-2.8-2.3-4A6 6 0 1 1 16.3 13.5c-1.1 1.2-2.3 2.5-2.3 4" stroke="#2E7D4F" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M9.5 18.5h5" stroke="#2E7D4F" stroke-width="1.5" stroke-linecap="round"/><path d="M10 21h4" stroke="#2E7D4F" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="1" x2="12" y2="3" stroke="#2E7D4F" stroke-width="1.5" stroke-linecap="round"/><line x1="4.5" y1="4.5" x2="6" y2="6" stroke="#43A66A" stroke-width="1.5" stroke-linecap="round"/><line x1="19.5" y1="4.5" x2="18" y2="6" stroke="#8BC6A0" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="logo-text">CREDIT BRIGHT</span>
    </a>

    <div class="auth-card">
      <h1 class="auth-title" id="authTitle">Welcome back</h1>
      <p class="auth-subtitle" id="authSubtitle">Sign in to access your courses and tools</p>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
      </div>

      <div id="authMessage" class="auth-message"></div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="input-wrapper">
            <input class="form-input" type="password" id="loginPassword" placeholder="Your password" required autocomplete="current-password">
            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">Show</button>
          </div>
        </div>
        <a class="forgot-link" onclick="handleForgotPassword()">Forgot password?</a>
        <button type="submit" class="auth-btn" id="loginBtn">Sign In</button>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" style="display:none;" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label class="form-label" for="signupName">Full Name</label>
          <input class="form-input" type="text" id="signupName" placeholder="Your full name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="signupEmail">Email</label>
          <input class="form-input" type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="signupPassword">Password</label>
          <div class="input-wrapper">
            <input class="form-input" type="password" id="signupPassword" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
            <button type="button" class="password-toggle" onclick="togglePassword('signupPassword', this)">Show</button>
          </div>
        </div>
        <div class="consent-group">
          <label class="consent-label">
            <input type="checkbox" id="termsConsent" onchange="updateSignupBtn()">
            <span>I am at least 16 years of age and agree to the <a href="terms-of-service.html" target="_blank">Terms of Service</a> and <a href="privacy-policy.html" target="_blank">Privacy Policy</a>.</span>
          </label>
        </div>
        <div class="consent-group">
          <label class="consent-label">
            <input type="checkbox" id="marketingConsent">
            <span>I would like to receive updates and offers from Credit Bright.</span>
          </label>
        </div>
        <button type="submit" class="auth-btn" id="signupBtn" disabled>Create Account</button>
      </form>
    </div>

    <div class="auth-footer">
      <a href="index.html">← Back to creditbright.com</a>
    </div>

    <div class="maple-footer">🍁 Built in Canada, for Canada</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://pohsjjmcasejogfjqoth.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YBv330YZuhZ_FtJ67iytBw_iGJuUT3c';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Check if already logged in
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    window.location.href = 'website-dashboard.html';
  }
})();

function switchTab(tab) {
  const tabs = document.querySelectorAll('.auth-tab');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const title = document.getElementById('authTitle');
  const subtitle = document.getElementById('authSubtitle');
  const msg = document.getElementById('authMessage');

  msg.className = 'auth-message';
  msg.style.display = 'none';

  tabs.forEach(t => t.classList.remove('active'));

  if (tab === 'login') {
    tabs[0].classList.add('active');
    loginForm.style.display = 'block';
    signupForm.style.display = 'none';
    title.textContent = 'Welcome back';
    subtitle.textContent = 'Sign in to access your courses and tools';
  } else {
    tabs[1].classList.add('active');
    loginForm.style.display = 'none';
    signupForm.style.display = 'block';
    title.textContent = 'Get started';
    subtitle.textContent = 'Create your Credit Bright account';
  }
}

function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = 'Hide';
  } else {
    input.type = 'password';
    btn.textContent = 'Show';
  }
}

function showMessage(text, type) {
  const msg = document.getElementById('authMessage');
  msg.textContent = text;
  msg.className = 'auth-message ' + type;
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.dataset.originalText = btn.textContent;
    btn.innerHTML = '<span class="spinner"></span>Please wait...';
  } else {
    btn.disabled = false;
    btn.textContent = btn.dataset.originalText || 'Submit';
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  setLoading('loginBtn', true);

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  setLoading('loginBtn', false);

  if (error) {
    showMessage(error.message === 'Invalid login credentials'
      ? 'Incorrect email or password. Please try again.'
      : error.message, 'error');
  } else {
    window.location.href = 'website-dashboard.html';
  }
}

function updateSignupBtn() {
  const terms = document.getElementById('termsConsent').checked;
  document.getElementById('signupBtn').disabled = !terms;
}

async function handleSignup(e) {
  e.preventDefault();
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const termsConsent = document.getElementById('termsConsent').checked;
  const marketingConsent = document.getElementById('marketingConsent').checked;

  if (!termsConsent) {
    showMessage('You must agree to the Terms of Service and Privacy Policy.', 'error');
    return;
  }

  if (password.length < 8) {
    showMessage('Password must be at least 8 characters.', 'error');
    return;
  }

  setLoading('signupBtn', true);

  const now = new Date().toISOString();

  const { data, error } = await sb.auth.signUp({
    email,
    password,
    options: {
      data: {
        full_name: name,
        terms_consent: true,
        terms_consent_at: now,
        marketing_consent: marketingConsent,
        marketing_consent_at: marketingConsent ? now : null
      }
    }
  });

  setLoading('signupBtn', false);

  if (error) {
    showMessage(error.message, 'error');
  } else if (data.session) {
    window.location.href = 'website-dashboard.html';
  } else {
    showMessage('Account created! Check your email to confirm, then sign in.', 'success');
    setTimeout(() => switchTab('login'), 3000);
  }
}

async function handleForgotPassword() {
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) {
    showMessage('Enter your email above first, then click Forgot password.', 'error');
    return;
  }

  const { error } = await sb.auth.resetPasswordForEmail(email);

  if (error) {
    showMessage(error.message, 'error');
  } else {
    showMessage('Password reset link sent. Check your email.', 'success');
  }
}
</script>
</body>
</html>
